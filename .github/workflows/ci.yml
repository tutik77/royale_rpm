name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    name: Tests (recommendation_service)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: recommendation_service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-recommendation
          path: recommendation_service/coverage.xml

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    continue-on-error: true   # информативно, не блокирует пайплайн
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check recommendation_service

  docker-build:
    name: Build images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build all service images
        run: docker compose build
